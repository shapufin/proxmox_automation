<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}VMware → Proxmox Migration{% endblock %}</title>
    <link rel="stylesheet" href="/static/dashboard.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-brand">
        <div class="eyebrow">Migration Tool</div>
        <h1>VMware → Proxmox</h1>
      </div>
      <nav class="nav">
        <a href="/">🏠 Dashboard</a>
        <a href="/browse/">📁 Browse Disks</a>
        <a href="/configs/">⚙️ Configs</a>
      </nav>
    </header>
    <main class="container">
      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
